<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calon & Pengundi - PRN Johor Ke-16</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Paste all your CSS code here */
        * { box-sizing: border-box; }
        body { margin: 0; background: #e9e6e0; font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #252118; }
        /* ... the rest of your CSS ... */
    </style>
</head>
<body>
    <div class="wrap">
        <header class="masthead">
            <div class="eyebrow">Pilihan Raya Negeri Johor Ke-16 · 11 Julai 2026</div>
            <h1>Calon & Pengundi Mengikut Kawasan (DUN)</h1>
        </header>

        <div class="stats">
            <div>
                <strong id="total-calon">0</strong>
                <span>CALON</span>
            </div>
            <div>
                <strong>56</strong>
                <span>KERUSI</span>
            </div>
            <div>
                <strong id="total-pengundi">0</strong>
                <span>PENGUNDI</span>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar">
                <input type="text" id="search-input" placeholder="Cari kawasan...">
                <div id="duns-list">
                    </div>
            </div>

            <div class="details-panel">
                <div id="dun-header">
                    <span id="dun-code">-</span>
                    <h2 id="dun-name">Pilih Kawasan</h2>
                    <div id="dun-voters">- JUMLAH PENGUNDI BERDAFTAR</div>
                </div>

                <h3>CALON BERTANDING</h3>
                <div id="candidates-list">
                    <p>Sila pilih kawasan di sebelah kiri.</p>
                </div>

                <hr>
                <div id="incumbent-info">
                    PENYANDANG PRN15 (2022): <span id="incumbent-name">-</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
</html>
